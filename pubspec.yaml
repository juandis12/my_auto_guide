name: my_auto_guide
description: A new Flutter project.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # Backend
  supabase_flutter: ^2.10.0

  # UI
  dotted_border: ^3.1.0
  photo_view: ^0.14.0
  google_fonts: ^6.2.1

  # Web / contenido
  url_launcher: ^6.2.5
  youtube_player_iframe: ^4.0.4
  webview_flutter: ^4.9.0

  # Archivos
  file_picker: ^8.0.0
  open_filex: ^4.0.0
  path_provider: ^2.0.11

  # Red
  http: ^1.5.0

  # Permisos
  permission_handler: ^12.0.1
  device_info_plus: ^11.5.0

  # Notificaciones
  flutter_local_notifications: ^17.1.2
  timezone: ^0.9.4
  connectivity_plus: ^6.0.0

  # Imágenes
  image_picker: ^1.1.0
  vision_gallery_saver: ^3.0.0

  # Almacenamiento local
  shared_preferences: ^2.3.2

  # State management
  provider: ^6.0.5

  # Offline / DB local
  sqflite: ^2.3.0
  path: ^1.8.3

  # Analytics y monitoreo
  sentry_flutter: ^8.0.0

  # Compresión de imágenes
  image: ^4.1.3

  # Internacionalización
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2

  # PDF
  syncfusion_flutter_pdfviewer: ^31.1.18
  pdf: ^3.11.1
  printing: ^5.13.2

  # Mapas y rutas
  flutter_map: ^6.1.0
  latlong2: ^0.9.1
  geolocator: ^13.0.2

  # Seguridad y Configuración
  flutter_dotenv: ^5.1.0

  # Fondo y Widgets
  flutter_background_service: ^5.0.10
  home_widget: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^5.0.0
  build_runner: ^2.4.7
  flutter_launcher_icons: ^0.14.4
  mockito: ^5.4.4

